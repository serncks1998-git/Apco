<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APCO | Ads & Sales Report</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
<style>
:root{
  --bg:#f0f2f7; --sidebar:#1a1f36; --card:#fff; --border:#e4e8f1;
  --text:#1a1f36; --text2:#6b7694; --text3:#a0abc8;
  --accent:#4f6ef7; --pos:#2db67d; --neg:#e6533c;
  --bim:#3b82f6; --liv:#ef4444; --mylife:#10b981; --cancino:#f59e0b;
  --fb:#1877f2; --google:#ea4335; --line:#06c755;
  --r:10px; --gap:14px; --sw:196px; --th:52px; --mh:46px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── TOP HEADER ── */
.topbar{height:var(--th);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.logo{font-size:15px;font-weight:800;color:var(--text);}
.logo span{color:var(--accent);}
.report-lbl{font-size:12px;color:var(--text2);padding-left:14px;border-left:1px solid var(--border);}
.spacer{flex:1;}
.updated{font-size:11px;color:var(--text3);}

/* ── MONTH TABS ── */
.monthtabs{height:var(--mh);background:var(--sidebar);display:flex;align-items:center;padding:0 16px;gap:4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.monthtabs::-webkit-scrollbar{display:none;}
.mtab{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.45);border:1px solid transparent;white-space:nowrap;transition:all .15s;}
.mtab:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.08);}
.mtab.active{color:#fff;background:var(--accent);border-color:var(--accent);}
.mtab.future{color:rgba(255,255,255,.25);cursor:default;font-style:italic;}

/* ── BODY LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sw);background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;flex-shrink:0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;}
.sb-section{padding:14px 12px 4px;}
.sb-label{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.28);padding:0 6px;margin-bottom:6px;}
.sb-divider{height:1px;background:rgba(255,255,255,.07);margin:8px 12px;}
.nav{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.5);font-size:12px;font-weight:500;transition:all .12s;margin-bottom:2px;}
.nav:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.nav.active{background:rgba(255,255,255,.13);color:#fff;font-weight:700;}
.ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ndot.all{background:linear-gradient(135deg,#4f6ef7,#a855f7);}
.ndot.bim{background:var(--bim);}
.ndot.liv{background:var(--liv);}
.ndot.mylife{background:var(--mylife);}
.ndot.cancino{background:var(--cancino);}
.sb-stat{background:rgba(255,255,255,.05);border-radius:8px;padding:10px 11px;margin:3px 0;}
.ss-lbl{font-size:10px;color:rgba(255,255,255,.32);margin-bottom:1px;}
.ss-val{font-size:16px;font-weight:800;color:#fff;}
.ss-sub{font-size:10px;color:rgba(255,255,255,.38);margin-top:1px;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:var(--gap);display:flex;flex-direction:column;gap:var(--gap);scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

/* ── SECTION HEAD ── */
.sh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);display:flex;align-items:center;gap:8px;}
.sh::after{content:'';flex:1;height:1px;background:var(--border);}
.pbadge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.pbadge.fb{background:#e7f0ff;color:#1877f2;}
.pbadge.google{background:#fde8e8;color:#ea4335;}
.pbadge.line{background:#e0faf0;color:#059669;}

/* ── FINDINGS ── */
.findings-wrap{display:flex;flex-direction:column;gap:16px;}
.findings-platform{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;}
.fp-head{padding:11px 16px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;}
.fp-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px;}
.findings-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fbox{border-radius:8px;padding:12px 14px;}
.fbox-str{background:#f0fdf4;border:1px solid #86efac;}
.fbox-sug{background:#fff7ed;border:1px solid #fdba74;}
.fbox-title{font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.fbox-title.str{color:#15803d;}
.fbox-title.sug{color:#c2410c;}
.fbox ul{list-style:none;display:flex;flex-direction:column;gap:5px;}
.fbox ul li{font-size:11.5px;line-height:1.55;color:#374151;padding-left:14px;position:relative;}
.fbox ul li::before{content:'•';position:absolute;left:2px;color:inherit;font-size:14px;line-height:1;}
.fbox-str ul li::before{color:#16a34a;}
.fbox-sug ul li::before{color:#ea580c;}
.fbox ul li strong{color:#111;}
.pattern-box{background:#f8faff;border:1.5px solid #c7d7fe;border-radius:8px;padding:12px 14px;font-size:11.5px;color:#1e40af;line-height:1.65;}
.pattern-box b{color:#1d4ed8;}
.mom-table-wrap{overflow-x:auto;}
.mom-table{width:100%;border-collapse:collapse;font-size:11.5px;}
.mom-table th{background:#f1f5f9;padding:7px 12px;text-align:left;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#475569;}
.mom-table th.r,.mom-table td.r{text-align:right;}
.mom-table td{padding:6px 12px;border-bottom:1px solid #f1f5f9;color:#374151;}
.mom-table tr:last-child td{border-bottom:none;}
.mom-up{color:#16a34a;font-weight:700;}
.mom-dn{color:#dc2626;font-weight:700;}
.mom-neut{color:#6b7280;}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.action-card{border-radius:8px;padding:12px 14px;}
.action-card-title{font-size:11px;font-weight:800;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.action-card ul{list-style:none;display:flex;flex-direction:column;gap:4px;}
.action-card ul li{font-size:11px;line-height:1.5;color:#374151;padding-left:12px;position:relative;}
.action-card ul li::before{content:'→';position:absolute;left:0;font-size:10px;}

/* ── AD COST ROW ── */
.adrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:var(--gap);}
.acard{background:var(--card);border-radius:var(--r);padding:13px 15px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative;overflow:hidden;}
.acard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.acard.total::before{background:#8b5cf6;}
.acard.bim::before{background:var(--bim);}
.acard.liv::before{background:var(--liv);}
.acard.mylife::before{background:var(--mylife);}
.acard.cancino::before{background:var(--cancino);}
.ac-lbl{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.ac-val{font-size:19px;font-weight:800;margin:3px 0 4px;}
.ac-tags{display:flex;flex-wrap:wrap;gap:5px;}
.atag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600;}
.atag.fb{background:#e7f0ff;color:#1877f2;}
.atag.google{background:#fde8e8;color:#ea4335;}
.atag.line{background:#e0faf0;color:#059669;}
.roas-pill{position:absolute;right:11px;top:13px;font-size:11px;font-weight:700;background:var(--bg);border-radius:20px;padding:2px 8px;color:var(--pos);}

/* ── KPI ROW ── */
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--gap);}
.kcard{background:var(--card);border-radius:var(--r);padding:13px 15px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-top:3px solid transparent;}
.kcard.total{border-top-color:#8b5cf6;}
.kcard.bim{border-top-color:var(--bim);}
.kcard.liv{border-top-color:var(--liv);}
.kcard.mylife{border-top-color:var(--mylife);}
.kcard.cancino{border-top-color:var(--cancino);}
.kc-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);}
.kc-val{font-size:20px;font-weight:800;margin:3px 0 2px;}
.kc-sub{font-size:10px;color:var(--text2);line-height:1.6;}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:var(--gap);}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:var(--gap);}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:var(--gap);}
.card{background:var(--card);border-radius:var(--r);padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.ct{font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px;}
.card canvas{max-height:230px;}

/* ── PLATFORM STAT GRID ── */
.pstat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px;}
.pstat{background:var(--bg);border-radius:8px;padding:10px 12px;}
.pst-lbl{font-size:10px;color:var(--text2);margin-bottom:2px;}
.pst-val{font-size:17px;font-weight:800;}
.pst-sub{font-size:10px;color:var(--text2);margin-top:1px;}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto;}
table.t{width:100%;border-collapse:collapse;font-size:12px;}
table.t thead th{padding:7px 10px;border-bottom:2px solid var(--border);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;text-align:left;}
table.t thead th.r{text-align:right;}
table.t tbody td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
table.t tbody td.r{text-align:right;}
table.t tbody tr:last-child td{border-bottom:none;}
table.t tbody tr:hover{background:#f8faff;}
table.t tfoot td{padding:7px 10px;font-weight:700;border-top:2px solid var(--border);background:#f8faff;}
table.t tfoot td.r{text-align:right;}
.rank{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--bg);font-size:10px;font-weight:700;color:var(--text2);flex-shrink:0;}
.rank.top3{background:#fef3c7;color:#92400e;}
.ad-name{max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kw-name{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-cell{display:flex;align-items:center;gap:6px;}
.mini-bar{height:6px;border-radius:3px;background:var(--bim);opacity:.7;min-width:2px;}
.dot8{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot8.bim{background:var(--bim);}
.dot8.liv{background:var(--liv);}
.dot8.mylife{background:var(--mylife);}
.dot8.cancino{background:var(--cancino);}
.bc{display:flex;align-items:center;gap:7px;}

/* ── SUMMARY TABLE ── */
table.st{width:100%;border-collapse:collapse;font-size:11.5px;}
table.st thead th{padding:8px 10px;border-bottom:2px solid var(--border);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;text-align:right;}
table.st thead th:first-child{text-align:left;}
table.st tbody td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;}
table.st tbody td:first-child{text-align:left;}
table.st tbody tr:hover{background:var(--bg);}
table.st tfoot td{padding:8px 10px;font-weight:700;border-top:2px solid var(--border);background:#f8faff;text-align:right;}
table.st tfoot td:first-child{text-align:left;}

/* ── FOOTER ── */
.footer{font-size:10px;color:var(--text3);text-align:center;padding:8px;}

@media(max-width:900px){.sidebar{display:none;}.g2,.g3{grid-template-columns:1fr;}}

/* ── OVERVIEW PAGE ── */
.ov-section{background:var(--card);border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:visible;}
.ov-head{padding:12px 18px;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;border-radius:var(--r) var(--r) 0 0;}
.ov-head.summary,.ov-head.sales{background:linear-gradient(90deg,#0d9488,#0f766e);}
.ov-head.fb-head{background:linear-gradient(90deg,#1877f2,#1565d8);}
.ov-head.gg-head{background:linear-gradient(90deg,#ea4335,#c62828);}
.ov-head.ln-head{background:linear-gradient(90deg,#06c755,#04a544);}
.ov-body{padding:16px 18px;}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px;}
.ov-stat{background:var(--bg);border-radius:8px;padding:16px 12px;text-align:center;}
.ov-lbl{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;line-height:1.5;}
.ov-val{font-size:22px;font-weight:800;line-height:1.2;color:var(--text);}
.ov-sub{font-size:10px;color:var(--text3);margin-top:5px;line-height:1.4;}
.ov-divider{height:1px;background:var(--border);margin:16px 0;}
.ov-subhead{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:10px;}
</style>
</head>

function renderSbStats(){
  const ps=vp();
  const tRev=ps.reduce((s,p)=>s+SALES[p].rev,0);
  const tSpend=ps.reduce((s,p)=>s+SALES[p].spend,0);
  const tNew=ps.reduce((s,p)=>s+SALES[p].new_cnt,0);
  const tOld=ps.reduce((s,p)=>s+SALES[p].old_cnt,0);
  document.getElementById('qs-rev').textContent=fmtM(tRev);
  document.getElementById('qs-spend').textContent=fmtM(tSpend);
  document.getElementById('qs-roas').textContent=`ROAS ${(tRev/tSpend).toFixed(2)}x`;
  document.getElementById('qs-new').textContent=tNew.toLocaleString();
  document.getElementById('qs-old').textContent=`Returning: ${tOld.toLocaleString()} คน`;
}

  });
  return h;
}

function fbTop5HTML(ps){

  allAds.forEach((r,i)=>{
    const p=r.brand;
    h+=`<tr>
      <td><span class="rank ${i<3?'top3':''}">${i+1}</span></td>
      ${ps.length>1?`<td><span class="bc"><span class="dot8 ${CL[p]}"></span>${p}</span></td>`:''}
      <td>
        <div class="bar-cell">
          <div class="mini-bar" style="width:${Math.round(r.pur/maxPur*80)}px;background:${C[p]};"></div>

      <td class="r">${r.reach.toLocaleString()}</td>
    </tr>`;
  });

  return h;
}

// BUILD GOOGLE TOP 10 KEYWORDS TABLE
// ════════════════════════════════════════════════
function ggKwHTML(ps){
  const validP=ps.filter(p=>GG_KW[p].length>0);
  if(!validP.length) return `<p style="color:var(--text3);font-size:12px;padding:12px 0">ไม่มีข้อมูล Google Ads สำหรับสินค้าที่เลือก</p>`;
  const useConv=validP.some(p=>GG_KW[p].some(r=>r.clicks===0&&r.conv>0));
  const sortKey=useConv?'conv':'clicks';
  const maxVal=Math.max(...validP.flatMap(p=>GG_KW[p].map(r=>r[sortKey]||0)));
  let h=`<div class="tbl-wrap"><table class="t">
    <thead><tr>
      <th style="width:28px">#</th>
      ${validP.length>1?'<th>แบรนด์</th>':''}
      <th>Keyword</th>
      <th class="r">Impressions</th>
      <th class="r">${sortKey==='clicks'?'Clicks':'Conversions'}</th>
      ${sortKey==='clicks'?'<th class="r">Conversions</th>':''}
    </tr></thead><tbody>`;

  validP.forEach(p=>{
    const kws=[...GG_KW[p]].sort((a,b)=>(b[sortKey]||0)-(a[sortKey]||0));
    kws.forEach((r,i)=>{
      const mainVal=r[sortKey]||0;
      h+=`<tr>
        <td><span class="rank ${i<3?'top3':''}">${i+1}</span></td>
        ${validP.length>1?`<td><span class="bc"><span class="dot8 ${CL[p]}"></span>${p}</span></td>`:''}
        <td>
          <div class="bar-cell">
            <div class="mini-bar" style="width:${maxVal>0?Math.round(mainVal/maxVal*80):2}px;background:${C[p]};"></div>
            <span class="kw-name" title="${r.kw}">${r.kw}</span>
          </div>
        </td>
        <td class="r">${r.impr.toLocaleString()}</td>
        <td class="r">${mainVal.toLocaleString()}</td>
        ${sortKey==='clicks'?`<td class="r">${r.conv.toLocaleString()}</td>`:''}
      </tr>`;
    });
  });
  h+=`</tbody></table></div>`;
  return h;
}

function fPlatHead(icon,title,color){

function fRow(strItems,sugItems){

function fMomRow(metric,feb,mar,trend){
  const cls=trend==='up'?'mom-up':trend==='dn'?'mom-dn':'mom-neut';

  return `<tr><td>${metric}</td><td class="r">${feb}</td><td class="r">${mar}</td><td class="r ${cls}">${arrow} ${mar}</td></tr>`;
}

// CHARTS
// ════════════════════════════════════════════════
function ch(id,type,data,opts){
  destroyChart(id);
  const ctx=document.getElementById(id);
  if(!ctx)return;
  charts[id]=new Chart(ctx.getContext('2d'),{type,data,options:{...bOpts,...opts}});
}
const scY=(fmt='M')=>({ticks:{callback:v=>fmt==='M'?fmtM(v):fmtN(v),font:{size:9}}});
const scX=()=>({grid:{display:false},ticks:{font:{size:9}}});
const tt=(fmt)=>({callbacks:{label:c=>`${c.dataset.label||c.label}: ${fmt==='F'?fmtF(c.parsed.y??c.parsed):fmtN(c.parsed.y??c.parsed)}`}});

function drawTrend(ps){
  ch('cTrend','line',{labels:DAYS,datasets:ps.map(p=>({label:p,data:DAILY[p],borderColor:C[p],backgroundColor:C[p]+'18',borderWidth:2,fill:false,tension:.3,pointRadius:2,pointHoverRadius:5}))},
    {interaction:{mode:'index',intersect:false},plugins:{...bOpts.plugins,tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmtF(c.parsed.y)}`}}},scales:{x:scX(),y:scY('M')}});
}
function drawON(ps){
  ch('cON','bar',{labels:ps,datasets:[
    {label:'ลค.เก่า',data:ps.map(p=>SALES[p].old_rev),backgroundColor:ps.map(p=>C[p]+'cc'),borderRadius:3},
    {label:'ลค.ใหม่',data:ps.map(p=>SALES[p].new_rev),backgroundColor:ps.map(p=>C[p]+'44'),borderRadius:3},
  ]},{plugins:{...bOpts.plugins,tooltip:tt('F')},scales:{x:{stacked:true,...scX()},y:{stacked:true,...scY('M')}}});
}
function drawRS(ps){
  ch('cRS','bar',{labels:ps,datasets:[
    {label:'ยอดขาย',data:ps.map(p=>SALES[p].rev),backgroundColor:ps.map(p=>C[p]+'bb'),borderRadius:4},
    {label:'Ad Spend',data:ps.map(p=>SALES[p].spend),backgroundColor:ps.map(p=>C[p]+'33'),borderRadius:4,borderColor:ps.map(p=>C[p]),borderWidth:1.5},
  ]},{plugins:{...bOpts.plugins,tooltip:tt('F')},scales:{x:scX(),y:scY('M')}});
}
function drawRoas(ps){
  ch('cRoas','bar',{labels:ps,datasets:[{label:'ROAS',data:ps.map(p=>SALES[p].roas),backgroundColor:ps.map(p=>C[p]+'cc'),borderRadius:6}]},
    {indexAxis:'y',plugins:{...bOpts.plugins,legend:{display:false},tooltip:{callbacks:{label:c=>`ROAS: ${c.parsed.x.toFixed(2)}x`}}},scales:{x:{ticks:{callback:v=>v+'x',font:{size:9}}},y:{grid:{display:false},ticks:{font:{size:10,weight:'bold'}}}}});
}
function drawFbIR(ps){
  ch('cFbIR','bar',{labels:ps,datasets:[
    {label:'Impressions',data:ps.map(p=>FB[p].impr),backgroundColor:ps.map(p=>C[p]+'bb'),borderRadius:4},
    {label:'Reach',      data:ps.map(p=>FB[p].reach),backgroundColor:ps.map(p=>C[p]+'44'),borderRadius:4},
  ]},{plugins:{...bOpts.plugins,tooltip:tt('N')},scales:{x:scX(),y:scY('N')}});
}
function drawFbMsg(ps){
  ch('cFbMsg','bar',{labels:ps,datasets:[{label:'Messaging',data:ps.map(p=>FB[p].msg),backgroundColor:ps.map(p=>C[p]+'cc'),borderRadius:4}]},
    {plugins:{...bOpts.plugins,legend:{display:false},tooltip:tt('N')},scales:{x:scX(),y:scY('N')}});
}
function drawFbSpend(ps){
  ch('cFbSpend','bar',{labels:ps,datasets:[{label:'FB Spend',data:ps.map(p=>FB[p].spend),backgroundColor:ps.map(p=>C[p]+'bb'),borderRadius:4}]},
    {plugins:{...bOpts.plugins,legend:{display:false},tooltip:tt('F')},scales:{x:scX(),y:scY('M')}});
}
function drawGgCC(ps){
  const vps=ps.filter(p=>GG[p].cost>0||GG[p].clicks>0);
  if(!vps.length){ch('cGgCC','bar',{labels:['ไม่มีข้อมูล'],datasets:[{data:[0],backgroundColor:'#e2e6f0'}]},{plugins:{legend:{display:false}}});return;}
  const useConv=vps.every(p=>GG[p].clicks===0);
  ch('cGgCC','bar',{labels:vps,datasets:[
    {label:useConv?'Conversions':'Clicks',    data:vps.map(p=>useConv?GG[p].conv:GG[p].clicks), backgroundColor:vps.map(p=>C[p]+'bb'),yAxisID:'y',borderRadius:4},

// FB TOP5 ADS TABLE (for a specific page)
// ════════════════════════════════════════════════
function fbPageAdsHTML(brand, pageIdx, color){
  const pd=FB_TOP5_PAGES[brand]&&FB_TOP5_PAGES[brand][pageIdx];
  if(!pd||!pd.ads||!pd.ads.length) return '<p style="color:var(--text3);font-size:12px;padding:8px 0">ไม่มีข้อมูล Ad</p>';
  // Sort by purchases desc
  const ads=[...pd.ads].sort((a,b)=>b.pur-a.pur);
  const maxPur=Math.max(...ads.map(r=>r.pur),1);
  let h=`<div class="tbl-wrap"><table class="t">
    <thead><tr>
      <th style="width:28px">#</th><th>Ad Content</th>
      <th class="r">Purchases ⬇</th><th class="r">Msg</th>
      <th class="r">Spend (฿)</th><th class="r">Reach</th>
    </tr></thead><tbody>`;
  ads.forEach((r,i)=>{
    h+=`<tr>
      <td><span class="rank ${i<3?'top3':''}">${i+1}</span></td>
      <td><div class="bar-cell">
        <div class="mini-bar" style="width:${Math.round(r.pur/maxPur*80)}px;background:${color}"></div>
        <span class="ad-name" title="${r.ad}">${r.ad}</span>
      </div></td>
      <td class="r"><strong>${r.pur}</strong></td><td class="r">${r.msg}</td>
      <td class="r">${fmtF(r.spend)}</td><td class="r">${r.reach.toLocaleString()}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

// ════════════════════════════════════════════════
// MARKETING → SALES FUNNEL SVG
// ════════════════════════════════════════════════
function funnelSVG(brand){
  const s=SALES[brand];
  const fb=FB[brand];
  const hex=C[brand];

  // ── Metrics ──
  const totalOrders=s.old_cnt+s.new_cnt;
  const closeRateAll=fb.msg>0?((totalOrders/fb.msg)*100).toFixed(1)+'%':'-';
  const closeRateNew=fb.msg>0?((s.new_cnt/fb.msg)*100).toFixed(1)+'%':'-';
  const costPerMsg=fb.msg>0?fmtF(Math.round(fb.spend/fb.msg)):'-';
  const roasAll=s.roas+'x';
  const roasOld=s.spend>0?(s.old_rev/s.spend).toFixed(2)+'x':'-';
  const roasNew=s.spend>0?(s.new_rev/s.spend).toFixed(2)+'x':'-';

  // ── Color helpers ──
  const [hr,hg,hb]=[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
  const dk=(t)=>'#'+[hr,hg,hb].map(v=>Math.round(v*t).toString(16).padStart(2,'0')).join('');
  const lt=(t)=>'#'+[hr,hg,hb].map(v=>Math.round(255+(v-255)*t).toString(16).padStart(2,'0')).join('');
  const autoTxt=(h)=>{
    const[r,g,b]=[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
    return (0.299*r+0.587*g+0.114*b)/255>0.46?dk(0.28):'#fff';
  };

  // ── Card builders ──
  // Dark card (solid brand shade) — always white text
  const darkCard=(lbl,val,bg,sub='',valSz=20)=>`
    <div style="background:${bg};border-radius:10px;padding:13px 14px;text-align:center;">
      <div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.7);margin-bottom:4px">${lbl}</div>
      <div style="font-size:${valSz}px;font-weight:800;color:#fff;line-height:1.1">${val}</div>
      ${sub?`<div style="font-size:9px;color:rgba(255,255,255,.65);margin-top:3px">${sub}</div>`:''}
    </div>`;
  // Light card (pastel tint) — auto dark text
  const lightCard=(lbl,val,sub='',valSz=18)=>{
    const bg=lt(0.12); const tc=dk(0.38);
    return `<div style="background:${bg};border:1px solid ${lt(0.35)};border-radius:10px;padding:13px 14px;text-align:center;">
      <div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:${tc};opacity:.75;margin-bottom:4px">${lbl}</div>
      <div style="font-size:${valSz}px;font-weight:800;color:${tc};line-height:1.1">${val}</div>
      ${sub?`<div style="font-size:9px;color:${tc};opacity:.6;margin-top:3px">${sub}</div>`:''}
    </div>`;
  };
  // Arrow connector
  const arrow=`<div style="font-size:16px;color:${lt(0.45)};align-self:center;flex-shrink:0;padding:0 2px">▶</div>`;
  const arrowDown=`<div style="font-size:13px;color:${lt(0.45)};text-align:center;line-height:1;padding:2px 0">▼</div>`;

  // ── MARKETING FUNNEL (4 steps horizontal) ──
  const mktSteps=[
    {lbl:'ค่า Ads รวม',         val:fmtM(s.spend),   sub:'Total Spend',       bg:dk(0.52)},
    {lbl:'การเข้าถึง',          val:fmtN(fb.reach),  sub:'FB Reach',          bg:dk(0.68)},
    {lbl:'การมีส่วนร่วม',       val:fmtN(fb.impr),   sub:'Impressions',       bg:hex},
    {lbl:'จำนวนทัก',            val:fmtN(fb.msg),    sub:'ต้นทุน/ทัก: '+costPerMsg, bg:lt(0.75)},
  ];
  const mktRow=mktSteps.map((st,i)=>{
    const tc=autoTxt(st.bg);
    return `<div style="flex:1;min-width:0;background:${st.bg};border-radius:10px;padding:13px 10px;text-align:center;">
      <div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:${tc};opacity:.75;margin-bottom:4px">${st.lbl}</div>
      <div style="font-size:20px;font-weight:800;color:${tc};line-height:1.1;margin-bottom:3px">${st.val}</div>
      <div style="font-size:9px;color:${tc};opacity:.65">${st.sub}</div>
    </div>${i<mktSteps.length-1?arrow:''}`;
  }).join('');

  // ── SALES FUNNEL (3-col: left metrics | center flow | right metrics) ──
  const salesLeft=`
    <div style="display:flex;flex-direction:column;gap:8px;width:120px;flex-shrink:0;padding-top:6px">
      ${lightCard('Order ใหม่',s.new_cnt.toLocaleString())}
      ${lightCard('Close Rate ใหม่',closeRateNew)}
    </div>`;

  // Extra brand-specific box (e.g. Mylife100 non-referral new customers)
  const extra=FUNNEL_EXTRA[brand];
  const extraBox=extra?`
    <div style="margin-top:6px;background:${lt(0.10)};border:1.5px solid ${lt(0.35)};border-radius:10px;padding:14px 16px;text-align:center;">
      <div style="font-size:10px;font-weight:700;color:${dk(0.40)};margin-bottom:6px">${extra.lbl}</div>
      <div style="font-size:22px;font-weight:800;color:${dk(0.38)};letter-spacing:-0.5px">฿ ${extra.rev.toLocaleString('th-TH')}</div>
      <div style="font-size:11px;color:${dk(0.45)};margin-top:4px;font-weight:600">${extra.cnt} คน</div>
    </div>`:'';

  const salesCenter=`
    <div style="flex:1;display:flex;flex-direction:column;gap:0">
      ${darkCard('จำนวน Order ทั้งหมด',totalOrders.toLocaleString()+' orders',dk(0.50))}
      ${arrowDown}
      ${darkCard('ยอดขายทั้งหมด',fmtM(s.rev),dk(0.65))}
      ${arrowDown}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        ${darkCard('ยอดขายลูกค้าเก่า',fmtM(s.old_rev),dk(0.78),s.old_cnt+' คน',15)}
        ${darkCard('ยอดขายลูกค้าใหม่',fmtM(s.new_rev),hex,s.new_cnt+' คน',15)}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px">
        ${lightCard('ROAS ลูกค้าเก่า',roasOld,'',20)}
        ${lightCard('ROAS ลูกค้าใหม่',roasNew,'',20)}
      </div>
      ${extraBox}
    </div>`;

  const salesRight=`
    <div style="display:flex;flex-direction:column;gap:8px;width:120px;flex-shrink:0;padding-top:6px">
      ${lightCard('Close Rate รวม',closeRateAll)}
      ${darkCard('ROAS รวม',roasAll,hex,'Overall',22)}
    </div>`;

  const divider=`<div style="position:relative;margin:16px 0 14px;">
    <div style="height:1px;background:var(--border)"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      background:var(--card);padding:0 12px;
      font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2)">🛒 Sales Funnel</div>
  </div>`;

  return `
  <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:10px">📣 Marketing Funnel</div>
  <div style="display:flex;gap:4px;align-items:stretch">${mktRow}</div>
  ${divider}
  <div style="display:flex;gap:10px;align-items:flex-start">
    ${salesLeft}
    <div style="font-size:13px;color:${lt(0.5)};align-self:flex-start;padding-top:20px;flex-shrink:0">◀</div>
    ${salesCenter}
    <div style="font-size:13px;color:${lt(0.5)};align-self:flex-start;padding-top:20px;flex-shrink:0">▶</div>
    ${salesRight}
  </div>`;
}

// SUMMARY TABLE
// ════════════════════════════════════════════════
function renderSumTable(ps){
  const tRev=ps.reduce((s,p)=>s+SALES[p].rev,0);
  let h=`<table class="st"><thead><tr>
    <th>สินค้า</th>
    <th>ยอดขายรวม</th><th>ลค.เก่า</th><th>ยอดขายเก่า</th>
    <th>ลค.ใหม่</th><th>ยอดขายใหม่</th>
    <th>Ad Spend</th><th>ROAS</th>
    <th>FB Spend</th><th>G Spend</th><th>LINE Spend</th>
    <th>FB Msg</th><th>FB Pur.</th><th>G Clicks</th><th>LINE Impr.</th>
    <th>% Rev</th>
  </tr></thead><tbody>`;
  ps.forEach(p=>{
    const s=SALES[p];
    const pct=tRev>0?(s.rev/tRev*100).toFixed(1):0;
    h+=`<tr>
      <td><span class="bc"><span class="dot8 ${CL[p]}"></span><strong>${p}</strong></span></td>
      <td class="r"><strong>${fmtF(s.rev)}</strong></td>
      <td class="r">${s.old_cnt}</td><td class="r">${fmtF(s.old_rev)}</td>
      <td class="r">${s.new_cnt}</td><td class="r">${fmtF(s.new_rev)}</td>
      <td class="r">${fmtF(s.spend)}</td><td class="r"><strong>${s.roas}x</strong></td>
      <td class="r">${fmtF(s.sp_fb)}</td>
      <td class="r">${s.sp_g?fmtF(s.sp_g):'-'}</td>
      <td class="r">${s.sp_l?fmtF(s.sp_l):'-'}</td>
      <td class="r">${FB[p].msg.toLocaleString()}</td>
      <td class="r">${FB[p].pur}</td>
      <td class="r">${GG[p].clicks?GG[p].clicks.toLocaleString():'-'}</td>
      <td class="r">${LN[p].impr?LN[p].impr.toLocaleString():'-'}</td>
      <td class="r">${pct}%</td>
    </tr>`;
  });
  const totSp=ps.reduce((s,p)=>s+SALES[p].spend,0);
  h+=`</tbody><tfoot><tr>
    <td>รวม</td>
    <td class="r">${fmtF(tRev)}</td>
    <td class="r">${ps.reduce((s,p)=>s+SALES[p].old_cnt,0)}</td>
    <td class="r">${fmtF(ps.reduce((s,p)=>s+SALES[p].old_rev,0))}</td>
    <td class="r">${ps.reduce((s,p)=>s+SALES[p].new_cnt,0)}</td>
    <td class="r">${fmtF(ps.reduce((s,p)=>s+SALES[p].new_rev,0))}</td>
    <td class="r">${fmtF(totSp)}</td>
    <td class="r">${(tRev/totSp).toFixed(2)}x</td>
    <td class="r">${fmtF(ps.reduce((s,p)=>s+SALES[p].sp_fb,0))}</td>
    <td class="r">${fmtF(ps.reduce((s,p)=>s+SALES[p].sp_g,0))}</td>
    <td class="r">${fmtF(ps.reduce((s,p)=>s+SALES[p].sp_l,0))}</td>
    <td class="r">${ps.reduce((s,p)=>s+FB[p].msg,0).toLocaleString()}</td>
    <td class="r">${ps.reduce((s,p)=>s+FB[p].pur,0)}</td>
    <td class="r">${ps.reduce((s,p)=>s+GG[p].clicks,0).toLocaleString()}</td>
    <td class="r">${ps.reduce((s,p)=>s+LN[p].impr,0).toLocaleString()}</td>
    <td class="r">100%</td>
  </tr></tfoot></table>`;
  document.getElementById('sumTbl').innerHTML=h;
}
