<style>
:root{
  --bg:#f0f2f7; --sidebar:#1a1f36; --card:#fff; --border:#e4e8f1;
  --text:#1a1f36; --text2:#6b7694; --text3:#a0abc8;
  --accent:#4f6ef7; --pos:#2db67d; --neg:#e6533c;
  --bim:#3b82f6; --liv:#ef4444; --mylife:#10b981; --cancino:#f59e0b;
  --fb:#1877f2; --google:#ea4335; --line:#06c755;
  --r:10px; --gap:14px; --sw:196px; --th:52px; --mh:46px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── TOP HEADER ── */
.topbar{height:var(--th);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.logo{font-size:15px;font-weight:800;color:var(--text);}
.logo span{color:var(--accent);}
.report-lbl{font-size:12px;color:var(--text2);padding-left:14px;border-left:1px solid var(--border);}
.spacer{flex:1;}
.updated{font-size:11px;color:var(--text3);}

/* ── MONTH TABS ── */
.monthtabs{height:var(--mh);background:var(--sidebar);display:flex;align-items:center;padding:0 16px;gap:4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.monthtabs::-webkit-scrollbar{display:none;}
.mtab{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.45);border:1px solid transparent;white-space:nowrap;transition:all .15s;}
.mtab:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.08);}
.mtab.active{color:#fff;background:var(--accent);border-color:var(--accent);}
.mtab.future{color:rgba(255,255,255,.25);cursor:default;font-style:italic;}

/* ── BODY LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sw);background:var(--sidebar);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;flex-shrink:0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;}
.sb-section{padding:14px 12px 4px;}
.sb-label{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.28);padding:0 6px;margin-bottom:6px;}
.sb-divider{height:1px;background:rgba(255,255,255,.07);margin:8px 12px;}
.nav{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.5);font-size:12px;font-weight:500;transition:all .12s;margin-bottom:2px;}
.nav:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.nav.active{background:rgba(255,255,255,.13);color:#fff;font-weight:700;}
.ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ndot.all{background:linear-gradient(135deg,#4f6ef7,#a855f7);}
.ndot.bim{background:var(--bim);}
.ndot.liv{background:var(--liv);}
.ndot.mylife{background:var(--mylife);}
.ndot.cancino{background:var(--cancino);}
.sb-stat{background:rgba(255,255,255,.05);border-radius:8px;padding:10px 11px;margin:3px 0;}
.ss-lbl{font-size:10px;color:rgba(255,255,255,.32);margin-bottom:1px;}
.ss-val{font-size:16px;font-weight:800;color:#fff;}
.ss-sub{font-size:10px;color:rgba(255,255,255,.38);margin-top:1px;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:var(--gap);display:flex;flex-direction:column;gap:var(--gap);scrollbar-width:thin;scrollbar-color:var(--border) transparent;}

/* ── SECTION HEAD ── */
.sh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);display:flex;align-items:center;gap:8px;}
.sh::after{content:'';flex:1;height:1px;background:var(--border);}
.pbadge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.pbadge.fb{background:#e7f0ff;color:#1877f2;}
.pbadge.google{background:#fde8e8;color:#ea4335;}
.pbadge.line{background:#e0faf0;color:#059669;}

/* ── AD COST ROW ── */
.adrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:var(--gap);}
.acard{background:var(--card);border-radius:var(--r);padding:13px 15px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative;overflow:hidden;}
.acard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.acard.total::before{background:#8b5cf6;}
.acard.bim::before{background:var(--bim);}
.acard.liv::before{background:var(--liv);}
.acard.mylife::before{background:var(--mylife);}
.acard.cancino::before{background:var(--cancino);}
.ac-lbl{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.ac-val{font-size:19px;font-weight:800;margin:3px 0 4px;}
.ac-tags{display:flex;flex-wrap:wrap;gap:5px;}
.atag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600;}
.atag.fb{background:#e7f0ff;color:#1877f2;}
.atag.google{background:#fde8e8;color:#ea4335;}
.atag.line{background:#e0faf0;color:#059669;}
.roas-pill{position:absolute;right:11px;top:13px;font-size:11px;font-weight:700;background:var(--bg);border-radius:20px;padding:2px 8px;color:var(--pos);}

/* ── KPI ROW ── */
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--gap);}
.kcard{background:var(--card);border-radius:var(--r);padding:13px 15px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-top:3px solid transparent;}
.kcard.total{border-top-color:#8b5cf6;}
.kcard.bim{border-top-color:var(--bim);}
.kcard.liv{border-top-color:var(--liv);}
.kcard.mylife{border-top-color:var(--mylife);}
.kcard.cancino{border-top-color:var(--cancino);}
.kc-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);}
.kc-val{font-size:20px;font-weight:800;margin:3px 0 2px;}
.kc-sub{font-size:10px;color:var(--text2);line-height:1.6;}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:var(--gap);}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:var(--gap);}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:var(--gap);}
.card{background:var(--card);border-radius:var(--r);padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.ct{font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px;}
.card canvas{max-height:230px;}

/* ── PLATFORM STAT GRID ── */
.pstat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px;}
.pstat{background:var(--bg);border-radius:8px;padding:10px 12px;}
.pst-lbl{font-size:10px;color:var(--text2);margin-bottom:2px;}
.pst-val{font-size:17px;font-weight:800;}
.pst-sub{font-size:10px;color:var(--text2);margin-top:1px;}

/* ── TABLES ── */
.tbl-wrap{overflow-x:auto;}
table.t{width:100%;border-collapse:collapse;font-size:12px;}
table.t thead th{padding:7px 10px;border-bottom:2px solid var(--border);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;text-align:left;}
table.t thead th.r{text-align:right;}
table.t tbody td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
table.t tbody td.r{text-align:right;}
table.t tbody tr:last-child td{border-bottom:none;}
table.t tbody tr:hover{background:#f8faff;}
table.t tfoot td{padding:7px 10px;font-weight:700;border-top:2px solid var(--border);background:#f8faff;}
table.t tfoot td.r{text-align:right;}
.rank{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--bg);font-size:10px;font-weight:700;color:var(--text2);flex-shrink:0;}
.rank.top3{background:#fef3c7;color:#92400e;}
.ad-name{max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.kw-name{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-cell{display:flex;align-items:center;gap:6px;}
.mini-bar{height:6px;border-radius:3px;background:var(--bim);opacity:.7;min-width:2px;}
.dot8{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}

.dot8.liv{background:var(--liv);}
.dot8.mylife{background:var(--mylife);}
.dot8.cancino{background:var(--cancino);}
.bc{display:flex;align-items:center;gap:7px;}

/* ── SUMMARY TABLE ── */
table.st{width:100%;border-collapse:collapse;font-size:11.5px;}
table.st thead th{padding:8px 10px;border-bottom:2px solid var(--border);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;text-align:right;}
table.st thead th:first-child{text-align:left;}
table.st tbody td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:right;}
table.st tbody td:first-child{text-align:left;}
table.st tbody tr:hover{background:var(--bg);}
table.st tfoot td{padding:8px 10px;font-weight:700;border-top:2px solid var(--border);background:#f8faff;text-align:right;}
table.st tfoot td:first-child{text-align:left;}

/* ── FOOTER ── */
.footer{font-size:10px;color:var(--text3);text-align:center;padding:8px;}

@media(max-width:900px){.sidebar{display:none;}.g2,.g3{grid-template-columns:1fr;}}
</style>
</head>

// ════════════════════════════════════════════════
// BUILD GOOGLE TOP 10 KEYWORDS TABLE
// ════════════════════════════════════════════════
function ggKwHTML(ps){
  const validP=ps.filter(p=>GG_KW[p].length>0);
  if(!validP.length) return `<p style="color:var(--text3);font-size:12px;padding:12px 0">ไม่มีข้อมูล Google Ads สำหรับสินค้าที่เลือก</p>`;
  const useConv=validP.some(p=>GG_KW[p].some(r=>r.clicks===0&&r.conv>0));
  const sortKey=useConv?'conv':'clicks';
  const maxVal=Math.max(...validP.flatMap(p=>GG_KW[p].map(r=>r[sortKey]||0)));
  let h=`<div class="tbl-wrap"><table class="t">
    <thead><tr>
      <th style="width:28px">#</th>
      ${validP.length>1?'<th>แบรนด์</th>':''}
      <th>Keyword</th>
      <th class="r">Impressions</th>
      <th class="r">${sortKey==='clicks'?'Clicks':'Conversions'}</th>
      ${sortKey==='clicks'?'<th class="r">Conversions</th>':''}
    </tr></thead><tbody>`;

  validP.forEach(p=>{
    const kws=[...GG_KW[p]].sort((a,b)=>(b[sortKey]||0)-(a[sortKey]||0));
    kws.forEach((r,i)=>{
      const mainVal=r[sortKey]||0;
      h+=`<tr>
        <td><span class="rank ${i<3?'top3':''}">${i+1}</span></td>
        ${validP.length>1?`<td><span class="bc"><span class="dot8 ${CL[p]}"></span>${p}</span></td>`:''}
        <td>
          <div class="bar-cell">
            <div class="mini-bar" style="width:${maxVal>0?Math.round(mainVal/maxVal*80):2}px;background:${C[p]};"></div>
            <span class="kw-name" title="${r.kw}">${r.kw}</span>
          </div>
        </td>
        <td class="r">${r.impr.toLocaleString()}</td>
        <td class="r">${mainVal.toLocaleString()}</td>
        ${sortKey==='clicks'?`<td class="r">${r.conv.toLocaleString()}</td>`:''}
      </tr>`;
    });
  });
  h+=`</tbody></table></div>`;
  return h;
}

// ════════════════════════════════════════════════
// CHARTS
// ════════════════════════════════════════════════
function ch(id,type,data,opts){
  destroyChart(id);
  const ctx=document.getElementById(id);
  if(!ctx)return;
  charts[id]=new Chart(ctx.getContext('2d'),{type,data,options:{...bOpts,...opts}});
}
const scY=(fmt='M')=>({ticks:{callback:v=>fmt==='M'?fmtM(v):fmtN(v),font:{size:9}}});
const scX=()=>({grid:{display:false},ticks:{font:{size:9}}});
const tt=(fmt)=>({callbacks:{label:c=>`${c.dataset.label||c.label}: ${fmt==='F'?fmtF(c.parsed.y??c.parsed):fmtN(c.parsed.y??c.parsed)}`}});

function drawTrend(ps){
  ch('cTrend','line',{labels:DAYS,datasets:ps.map(p=>({label:p,data:DAILY[p],borderColor:C[p],backgroundColor:C[p]+'18',borderWidth:2,fill:false,tension:.3,pointRadius:2,pointHoverRadius:5}))},
    {interaction:{mode:'index',intersect:false},plugins:{...bOpts.plugins,tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmtF(c.parsed.y)}`}}},scales:{x:scX(),y:scY('M')}});
}
function drawON(ps){
  ch('cON','bar',{labels:ps,datasets:[
    {label:'ลค.เก่า',data:ps.map(p=>SALES[p].old_rev),backgroundColor:ps.map(p=>C[p]+'cc'),borderRadius:3},
    {label:'ลค.ใหม่',data:ps.map(p=>SALES[p].new_rev),backgroundColor:ps.map(p=>C[p]+'44'),borderRadius:3},
  ]},{plugins:{...bOpts.plugins,tooltip:tt('F')},scales:{x:{stacked:true,...scX()},y:{stacked:true,...scY('M')}}});
}
function drawRS(ps){
  ch('cRS','bar',{labels:ps,datasets:[
    {label:'ยอดขาย',data:ps.map(p=>SALES[p].rev),backgroundColor:ps.map(p=>C[p]+'bb'),borderRadius:4},

  ]},{plugins:{...bOpts.plugins,tooltip:tt('F')},scales:{x:scX(),y:scY('M')}});

function drawLn(ps){
  const lp=ps.filter(p=>LN[p].cost>0);
  const noData=(id)=>{ch(id,'bar',{labels:['ไม่มีข้อมูล'],datasets:[{data:[0],backgroundColor:'#e2e6f0'}]},{plugins:{legend:{display:false}}});};
  if(!lp.length){['cLnI','cLnR','cLnC','cLnS'].forEach(noData);return;}
  ch('cLnI','doughnut',{labels:lp,datasets:[{data:lp.map(p=>LN[p].impr),backgroundColor:lp.map(p=>C[p]+'cc'),borderColor:'#fff',borderWidth:2}]},
    {cutout:'62%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,font:{size:10}}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmtN(c.parsed)}`}}}});
  ch('cLnR','doughnut',{labels:lp,datasets:[{data:lp.map(p=>LN[p].reach),backgroundColor:lp.map(p=>C[p]+'cc'),borderColor:'#fff',borderWidth:2}]},
    {cutout:'62%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,font:{size:10}}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmtN(c.parsed)}`}}}});
  ch('cLnC','doughnut',{labels:lp,datasets:[{data:lp.map(p=>LN[p].clicks),backgroundColor:lp.map(p=>C[p]+'cc'),borderColor:'#fff',borderWidth:2}]},
    {cutout:'62%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,font:{size:10}}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmtN(c.parsed)}`}}}});
  ch('cLnS','doughnut',{labels:lp,datasets:[{data:lp.map(p=>LN[p].cost),backgroundColor:lp.map(p=>C[p]+'cc'),borderColor:'#fff',borderWidth:2}]},
    {cutout:'62%',plugins:{legend:{position:'bottom',labels:{usePointStyle:true,font:{size:10}}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmtF(c.parsed)}`}}}});
}

// ════════════════════════════════════════════════
// SUMMARY TABLE
// ════════════════════════════════════════════════
function renderSumTable(ps){
  const tRev=ps.reduce((s,p)=>s+SALES[p].rev,0);
  let h=`<table class="st"><thead><tr>
    <th>สินค้า</th>
    <th>ยอดขายรวม</th><th>ลค.เก่า</th><th>ยอดขายเก่า</th>
    <th>ลค.ใหม่</th><th>ยอดขายใหม่</th>
    <th>Ad Spend</th><th>ROAS</th>
    <th>FB Spend</th><th>G Spend</th><th>LINE Spend</th>
    <th>FB Msg</th><th>FB Pur.</th><th>G Clicks</th><th>LINE Impr.</th>
    <th>% Rev</th>
  </tr></thead><tbody>`;
  ps.forEach(p=>{
    const s=SALES[p];
    const pct=tRev>0?(s.rev/tRev*100).toFixed(1):0;
    h+=`<tr>
      <td><span class="bc"><span class="dot8 ${CL[p]}"></span><strong>${p}</strong></span></td>
      <td class="r"><strong>${fmtF(s.rev)}</strong></td>
      <td class="r">${s.old_cnt}</td><td class="r">${fmtF(s.old_rev)}</td>
      <td class="r">${s.new_cnt}</td><td class="r">${fmtF(s.new_rev)}</td>
      <td class="r">${fmtF(s.spend)}</td><td class="r"><strong>${s.roas}x</strong></td>
      <td class="r">${fmtF(s.sp_fb)}</td>
      <td class="r">${s.sp_g?fmtF(s.sp_g):'-'}</td>
      <td class="r">${s.sp_l?fmtF(s.sp_l):'-'}</td>
      <td class="r">${FB[p].msg.toLocaleString()}</td>
      <td class="r">${FB[p].pur}</td>
      <td class="r">${GG[p].clicks?GG[p].clicks.toLocaleString():'-'}</td>
      <td class="r">${LN[p].impr?LN[p].impr.toLocaleString():'-'}</td>
      <td class="r">${pct}%</td>
    </tr>`;
  });
  const totSp=ps.reduce((s,p)=>s+SALES[p].spend,0);
  h+=`</tbody><tfoot><tr>
    <td>รวม</td>
    <td class="r">${fmtF(tRev)}</td>
    <td class="r">${ps.reduce((s,p)=>s+SALES[p].old_cnt,0)}</td>
    <td class="r">${fmtF(ps.reduce((s,p)=>s+SALES[p].old_rev,0))}</td>
    <td class="r">${ps.reduce((s,p)=>s+SALES[p].new_cnt,0)}</td>
    <td class="r">${fmtF(ps.reduce((s,p)=>s+SALES[p].new_rev,0))}</td>
    <td class="r">${fmtF(totSp)}</td>
    <td class="r">${(tRev/totSp).toFixed(2)}x</td>
    <td class="r">${fmtF(ps.reduce((s,p)=>s+SALES[p].sp_fb,0))}</td>
    <td class="r">${fmtF(ps.reduce((s,p)=>s+SALES[p].sp_g,0))}</td>
    <td class="r">${fmtF(ps.reduce((s,p)=>s+SALES[p].sp_l,0))}</td>
    <td class="r">${ps.reduce((s,p)=>s+FB[p].msg,0).toLocaleString()}</td>
    <td class="r">${ps.reduce((s,p)=>s+FB[p].pur,0)}</td>
    <td class="r">${ps.reduce((s,p)=>s+GG[p].clicks,0).toLocaleString()}</td>
    <td class="r">${ps.reduce((s,p)=>s+LN[p].impr,0).toLocaleString()}</td>
    <td class="r">100%</td>
  </tr></tfoot></table>`;
  document.getElementById('sumTbl').innerHTML=h;
}
